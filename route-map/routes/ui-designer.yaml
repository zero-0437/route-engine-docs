      - excalidraw
      - taste-skill
  - type: phrase
    pattern: 视觉
    weight: 0.8
    skills: []
  - type: phrase
    pattern: 图标
    weight: 0.8
    skills: []
  - type: phrase
    pattern: 样式
    weight: 0.8
    skills: []
  - type: phrase
    pattern: 布局
    weight: 0.8
    skills: []
  - type: phrase
    pattern: 配色
    weight: 0.8
    skills: []
  - type: phrase
    pattern: 动效
    weight: 0.8
    skills: []
