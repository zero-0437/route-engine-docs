  - type: phrase
    pattern: 前端
    weight: 0.8
    skills: []
  - type: regex
    pattern: \b(css|html|react|vue)\b
    weight: 0.6
    skills: []

  # ── 图表/海报/宣传图 ──────────────────────────────────
  - type: phrase
    pattern: 图表设计
    weight: 0.8
    skills:
      - claude-design
      - excalidraw
      - taste-skill
