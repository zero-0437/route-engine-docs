# route-map/routes/ui-designer.yaml
# 前端与视觉设计 — 设计实现+创意生成
agent: ui-designer
priority: 5
condition: UI/UX 设计/视觉图表/前端原型
rules:
  # ── UI/UX 设计 ─────────────────────────────────────────
  - type: regex
    pattern: (界面|设计.*界面|设计稿)
    weight: 0.8
    skills:
      - claude-design
      - excalidraw
      - taste-skill
  # ── UI 设计关键词（视觉/样式/配色/布局/前端） ───────────────────────
  - type: regex
    pattern: (视觉|图标|样式|布局|配色|前端)
    weight: 0.8
    skills: []
  - type: regex
    pattern: (动效|动画)
    weight: 0.8
    skills: []
  - type: regex
    pattern: \b(UI|UX)\b
    weight: 0.8
    skills: []
  - type: regex
    pattern: (组件|响应式|\\bcss\\b|\\bhtml\\b|\\breact\\b|\\bvue\\b)
    weight: 0.6
    skills: []

  # ── 美观/美化 → 通用 ───────────────────────────────────
  - type: regex
    pattern: (美观|美化)
    weight: 0.6
    skills: []

  # ── 通用设计意图（2026-07-02 新增） ────────────────────────────
  - type: phrase
    pattern: 设计
    weight: 0.6
    skills:
      - claude-design
      - excalidraw
      - taste-skill
    fuzzy: true

  # ── 原型/草图/线框图 ───────────────────────────────────
  - type: regex
    pattern: (草图|线框图)
    weight: 0.9
    skills: []
  - type: regex
    pattern: \b(mockup|figma|sketch)\b
    weight: 0.9
    skills: []
  - type: regex
    pattern: 设计.*原型
    weight: 0.9
    skills:
      - claude-design
      - excalidraw
      - taste-skill

  # ── 图表/海报/宣传图 ──────────────────────────────────
  - type: phrase
    pattern: 图表设计
    weight: 0.8
    skills:
      - claude-design
      - excalidraw
      - taste-skill
    fuzzy: true
  - type: regex
    pattern: (海报|宣传图|\b(infographic|banner)\b)
    weight: 0.8
    skills: []
