  - type: phrase
    pattern: 设计
    weight: 0.6
    skills:
      - claude-design
      - excalidraw
      - taste-skill
    fuzzy: true

  # ── 原型/草图/线框图 ───────────────────────────────────
  - type: phrase
    pattern: 草图
    weight: 0.9
    skills: []
  - type: phrase
    pattern: 线框图
    weight: 0.9
    skills: []
  - type: regex
    pattern: \b(mockup|figma|sketch)\b
    weight: 0.9
    skills: []
  - type: regex
    pattern: 设计.*原型
    weight: 0.9
    skills:
