  - type: phrase
    pattern: 动画
    weight: 0.8
    skills: []
  - type: regex
    pattern: \b(UI|UX)\b
    weight: 0.8
    skills: []
  - type: regex
    pattern: 设计.*界面
    weight: 0.8
    skills:
      - claude-design
      - excalidraw
      - taste-skill
