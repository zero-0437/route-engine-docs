# route-map/routes/spec-agent.yaml
# 新项目/新功能强制入口 — 只写文档不碰代码
agent: spec-agent
priority: 1
condition: 新项目/新功能强制入口 — 需求对齐+PRD 产出

rules:
  # ── 高权重核心匹配 ──────────────────────
  - type: phrase
    pattern: 实现
    weight: 1.0
    skills: [domain-modeling, spec-authoring]

  - type: phrase
    pattern: 制作
    weight: 1.0
    skills: [domain-modeling]

  - type: phrase
    pattern: 创建
    weight: 1.0
    skills: [domain-modeling]

  - type: phrase
    pattern: 开发
    weight: 1.0
    skills: [domain-modeling, spec-authoring]

  - type: phrase
    pattern: 构建
    weight: 1.0
    skills: [domain-modeling]

  - type: phrase
    pattern: 搞一个
    weight: 1.0
    skills: [domain-modeling]

  - type: phrase
    pattern: 写一个
    weight: 1.0
    skills: [domain-modeling, spec-authoring]

  - type: phrase
    pattern: 加一个
    weight: 0.9
    skills: [domain-modeling]

  - type: phrase
    pattern: 新功能
    weight: 1.0
    skills: [domain-modeling, spec-authoring]
    fuzzy: true

  - type: phrase
    pattern: 新项目
    weight: 1.0
    skills: [domain-modeling, spec-authoring]
    fuzzy: true

  - type: regex
    pattern: \b(new project|new feature|implement|create|build|make)\b
    weight: 0.9
    skills: [domain-modeling, spec-authoring]


  # ── 误匹配防护——负权重，无技能 ────────────────────────
  - type: phrase
    pattern: 改
    weight: -0.5
    skills: []
  - type: phrase
    pattern: 修
    weight: -0.5
    skills: []
  - type: phrase
    pattern: 删
    weight: -0.5
    skills: []

  # ── 防构建失败/编译错误截胡 ──────────────────
  - type: regex
    pattern: (失败|错误|出错)
    weight: -1.0
    skills: []

  # ── 防调试/诊断语境截胡 ──────────────────────
  - type: phrase
    pattern: 诊断
    weight: -0.5
    skills: []
  - type: phrase
    pattern: 复盘
    weight: -0.5
    skills: []
  - type: phrase
    pattern: 排查
    weight: -0.5
    skills: []
  - type: phrase
    pattern: 分析
    weight: -0.3
    skills: []
