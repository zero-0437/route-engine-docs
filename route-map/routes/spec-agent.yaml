agent: spec-agent
priority: 1
condition: 新项目/新功能强制入口 — 需求对齐+PRD 产出
rules:
- type: phrase
  pattern: 实现
  weight: 1.0
  skills:
  - domain-modeling
  - spec-authoring
- type: phrase
  pattern: 制作
  weight: 1.0
  skills:
  - domain-modeling
- type: phrase
  pattern: 创建
  weight: 1.0
  skills:
  - domain-modeling
- type: phrase
  pattern: 开发
  weight: 1.0
  skills:
  - domain-modeling
  - spec-authoring
- type: phrase
  pattern: 搞一个
  weight: 1.0
  skills:
  - domain-modeling
- type: phrase
  pattern: 写一个
  weight: 1.0
  skills:
  - domain-modeling
  - spec-authoring
- type: phrase
  pattern: 加一个
  weight: 0.9
  skills:
  - domain-modeling
- type: phrase
  pattern: 新功能
  weight: 1.0
  skills:
  - domain-modeling
  - spec-authoring
  fuzzy: true
- type: phrase
  pattern: 新项目
  weight: 1.0
  skills:
  - domain-modeling
  - spec-authoring
  fuzzy: true
- type: regex
  pattern: \b(new project|new feature|implement|create|build|make)\b
  weight: 0.9
  skills:
  - domain-modeling
  - spec-authoring
- type: phrase
  pattern: 改
  weight: -0.5
  skills: []
- type: regex
  pattern: (失败|错误|出错)
  weight: -1.0
  skills: []
- type: phrase
  pattern: 诊断
  weight: -0.5
  skills: []
- type: phrase
  pattern: 复盘
  weight: -0.5
  skills: []
- type: phrase
  pattern: 排查
  weight: -0.5
  skills: []
- type: phrase
  pattern: 分析
  weight: -0.3
  skills: []
