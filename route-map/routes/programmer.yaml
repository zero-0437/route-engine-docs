agent: programmer
priority: 2
condition: Coding 任务（新功能/修 bug/重构→走 superpowers 全管线）
rules:
# 通用编程意图
- type: regex
  pattern: (实现|开发|实现新功能)
  weight: 0.8
  skills:
  - spike
- type: regex
  pattern: (编码|编程|写.*代码)
  weight: 0.8
  skills:
  - spike
- type: phrase
  pattern: 写一个函数
  weight: 1.0
  skills:
  - spike
  fuzzy: true
- type: regex
  pattern: \b(implement)\b
  weight: 0.7
  skills:
  - spike

# Bug 修复
- type: phrase
  pattern: 修复这个 bug
  weight: 1.0
  fuzzy: true
  skills:
  - systematic-debugging
  - codebase-inspection
- type: regex
  pattern: 修复.*bug
  weight: 1.5
  skills:
  - systematic-debugging
  - codebase-inspection
- type: phrase
  pattern: bug
  weight: 0.7
  skills:
  - systematic-debugging
  - codebase-inspection
  description: Bug 提及→programmer 备选，但低于 EA 的 1.0
- type: regex
  pattern: \b(fix)\b
  weight: 0.7
  skills:
  - systematic-debugging
  - codebase-inspection

# 重构
- type: regex
  pattern: (重构|\brefactor\b)
  weight: 0.8
  skills:
  - systematic-debugging

# 测试
- type: phrase
  pattern: 测试
  weight: 0.8
  skills: []
- type: regex
  pattern: \b(TDD)\b
  weight: 0.8
  skills: []
- type: regex
  pattern: \b(write.*test)\b
  weight: 0.7
  skills: []

# Git/PR 操作
- type: regex
  pattern: \b(commit|push|PR|pull\.request)\b
  weight: 0.8
  skills:
  - github-pr-workflow
  - github-code-review

# 安装/部署/构建
- type: regex
  pattern: (安装|\binstall\b)
  weight: 0.8
  skills:
  - compatibility-audit
- type: phrase
  pattern: 部署
  weight: 0.8
  skills:
  - compatibility-audit
- type: regex
  pattern: (构建|\bbuild\b|\bcompile\b)
  weight: 0.8
  skills:
  - compatibility-audit

# 语言识别
- type: regex
  pattern: \b(python|javascript|typescript|golang|rust|java|c\+\+|shell|bash|makefile)\b
  weight: 0.6
  skills: []
