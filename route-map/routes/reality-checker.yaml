# route-map/routes/reality-checker.yaml
# 集成测试专家 — 阻止幻想式审批
agent: reality-checker
priority: 11
condition: 集成测试/端到端验证/现实检验
rules:
  # ── 测试/验证 ──────────────────────────────────────────
  - type: phrase
    pattern: 集成测试
    weight: 1.2
    skills: []
    fuzzy: true
  - type: regex
    pattern: (端到端|现实检验)
    weight: 0.8
    skills: []
  - type: regex
    pattern: (验收|回归测试|实现对比)
    weight: 0.7
    skills: []
  - type: regex
    pattern: \b(dogfood|e2e|end.to.end|smoke.*test|verification|validation)\b
    weight: 0.9
    skills: []
  - type: phrase
    pattern: 检查是否真的能用
    weight: 1.0
    fuzzy: true
    skills: []

  # ── 尝试/验证短语 ─────────────────────────────────
  - type: regex
    pattern: (试试|验一下|测一下)
    weight: 0.5
    skills: []
  - type: regex
    pattern: (验证一下|核实一下)
    weight: 0.6
    skills: []

  # ── 截图/视觉验证（SOUL.md §3 强制工作流第2条：Playwright 完整截图捕获） ──
  - type: regex
    pattern: (截图|交叉验证|视觉验证)
    weight: 0.8
    skills: []

  # ── 差距分析/生产就绪（SOUL.md §3 第4条 + §4 交付物） ───────────
  - type: regex
    pattern: (差距分析|生产就绪)
    weight: 0.9
    skills: []
  # ── 审核/质量评估/上线发布检查（SOUL.md §1 + §4） ─────────────
  - type: regex
    pattern: (上线检查|发布审核|质量评估|质量评审)
    weight: 0.8
    skills: []

  # ── 用户旅程/流程验证（SOUL.md §3 第3条） ───────────────────────
  - type: regex
    pattern: (用户旅程|用户流程)
    weight: 0.8
    skills: []
