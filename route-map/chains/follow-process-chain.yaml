# chain_name: follow-process-chain
# NOTE: 此 chain 未在 index.yaml 中显式注册 chain_ref，通过 chains/ 目录扫描发现。
# 任何 agent 需要此流程时可在 index.yaml 的 chain_ref 中引用。
chain_name: follow-process-chain
chain_keywords: [按流程走, 标准流程, standard-flow, 全流程管线]
description: "标准流程管线 — PM拆解→Programmer实现→双评审(含修复循环)"
owner: pm-agent
steps:
  - agent: pm-agent
    goal: 任务拆解 — 将交付任务拆解为可执行的垂直切片
    keywords: [decompose, break-down, task-split, slice]
    completion_contract:
      - type: script
        description: "任务切片文件存在"
        verify_command: "test -f task-slice.md"
  - agent: programmer
    goal: 按拆解结果逐个实现代码
    keywords: [implement, build, execute, code]
    batch: true
  - agent: error-analyst
    goal: spec 合规评审
    keywords: [spec-review, spec-check, compliance, 合规审查]
    completion_contract:
      - type: script
        description: "合规评审报告文件存在"
        verify_command: "test -f review.md"
  - agent: programmer
    goal: 代码质量评审
    keywords: [quality-review, code-review, audit, 质量审计]
    completion_contract:
      - type: script
        description: "质量评审报告文件存在"
        verify_command: "test -f quality-report.md"
  - agent: data-analyst
    goal: "Architecture 轴评审 — 模块边界/接口一致性/ADR合规/依赖方向/模式一致性/测试seam质量/scope creep检测"
    keywords: [architecture-review, adr, module-boundary, dependency]
    completion_contract:
      - type: script
        description: "架构评审报告文件存在"
        verify_command: "test -f architecture_report.md"
chain_step_skills:
  pm-agent@0: [writing-plans]
  pm-agent@1: [test-driven-development]
  pm-agent@2: [requesting-code-review]
  pm-agent@3: [requesting-code-review, receiving-code-review]
  pm-agent@4: [architecture-review, codebase-inspection]
